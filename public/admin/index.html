<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publisher Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Global CSS properties for typography and styling -->
    <style>
      /* Quick pre-loading background matching charcoal dark theme */
      body {
        background-color: #0b0a09;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- Strict authentication gate block -->
    <script>
      (async function () {
        // Same-origin redirect handler (for both popup and full-page redirect flows)
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (token) {
          const userObj = {
            token: token,
            provider: 'github',
            backendName: 'github'
          };
          localStorage.setItem('decap-cms-user', JSON.stringify(userObj));
          localStorage.setItem('netlify-cms-user', JSON.stringify(userObj));
          if (window.opener) {
            window.opener.location.reload();
            window.close();
            return;
          } else {
            // Clean the URL query params without reloading the page
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
          }
        }

        const userStr = localStorage.getItem('decap-cms-user') || localStorage.getItem('netlify-cms-user');
        if (userStr) {
          try {
            const user = JSON.parse(userStr);

            // Fetch profile name using token if login is not cached yet
            if (user.token && !user.login) {
              try {
                const res = await fetch('https://api.github.com/user', {
                  headers: { 'Authorization': `token ${user.token}` }
                });
                if (res.ok) {
                  const profile = await res.json();
                  user.login = profile.login;
                  user.backendName = 'github';
                  const updatedStr = JSON.stringify(user);
                  localStorage.setItem('decap-cms-user', updatedStr);
                  localStorage.setItem('netlify-cms-user', updatedStr);
                } else {
                  const errText = await res.text();
                  alert('GitHub API Authorization Failed (Status ' + res.status + '): ' + errText + '\nToken: ' + user.token.substring(0, 10) + '...');
                  localStorage.removeItem('decap-cms-user');
                  localStorage.removeItem('netlify-cms-user');
                  location.reload();
                  return;
                }
              } catch (fetchErr) {
                alert('Network/CORS Error fetching user profile: ' + fetchErr.message);
                localStorage.removeItem('decap-cms-user');
                localStorage.removeItem('netlify-cms-user');
                location.reload();
                return;
              }
            }

            if (user.login && user.login.toLowerCase() !== 'srinivasbj') {
              alert('Access Denied: Logged in as GitHub user "' + user.login + '". Only "srinivasbj" is authorized to access the CMS.');
              localStorage.removeItem('decap-cms-user');
              localStorage.removeItem('netlify-cms-user');
              location.reload();
              return;
            }
          } catch (e) {
            localStorage.removeItem('decap-cms-user');
            localStorage.removeItem('netlify-cms-user');
          }
        }

        // Intercept Login button clicks to run a popup-free redirect flow
        document.addEventListener('click', function (e) {
          const loginButton = e.target.closest('button');
          if (loginButton && (loginButton.innerText.includes('Login with GitHub') || loginButton.textContent.includes('Login with GitHub'))) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = "https://restless-lab-a40d.ssai603174.workers.dev/auth";
          }
        }, true); // Capture phase to run before Decap CMS click listener
      })();
    </script>

    <!-- Load Decap CMS via unpkg CDN -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>

    <!-- Configure CMS Event Listeners -->
    <script>
      (function () {
        if (window.CMS) {
          // Monitor login events
          CMS.registerEventListener({
            name: 'login',
            handler: ({ user }) => {
              if (user.login.toLowerCase() !== 'srinivasbj') {
                localStorage.removeItem('decap-cms-user');
                alert('Access Denied: Only srinivasBJ is authorized to access the CMS.');
                location.reload();
              }
            }
          });
        }
      })();
    </script>
  </body>
</html>
